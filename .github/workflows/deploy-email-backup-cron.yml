name: Deploy email backup common
concurrency:
  group: market-data-notification-cron-install
  cancel-in-progress: false
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - warning
          - debug
env:
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
  APP_NAME: market_data_notification
  REMOTE_BASE_DIR: /home/${{ secrets.SSH_USER }}/market_data_notification_jobs
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_KNOWN_HOSTS" ]
          then
            echo "SSH_KNOWN_HOSTS secret must be configured"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/market_data_notification_rsa
          chmod 600 ~/.ssh/market_data_notification_rsa
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat << EOF > ~/.ssh/config
          Host production
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/market_data_notification_rsa
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
      - name: Check SSH connectivity
        run: ssh production 'echo "SSH connectivity confirmed"'
      - name: Upload email backup script and env file
        env:
          MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
          MAILJET_SECRET_KEY: ${{ secrets.MAILJET_SECRET_KEY }}
          MAILJET_API_BASE_URL: ${{ secrets.MAILJET_API_BASE_URL }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          REDIS_KEY: ${{ secrets.REDIS_KEY }}
          MAILJET_REDIS_TEMPLATE_ID: ${{ secrets.MAILJET_REDIS_TEMPLATE_ID }}
          STOCKS_TELEGRAM_ADMIN_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_ADMIN_BOT_TOKEN }}
          STOCKS_TELEGRAM_ADMIN_ID: ${{ secrets.STOCKS_TELEGRAM_ADMIN_ID }}
        run: |
          ssh production "mkdir -p '$REMOTE_BASE_DIR/cron' '$REMOTE_BASE_DIR/config' '$REMOTE_BASE_DIR/logs'"
          scp ./scripts/cron/email_backup.sh production:"$REMOTE_BASE_DIR/cron/email_backup.sh"
          ssh production "chmod 755 '$REMOTE_BASE_DIR/cron/email_backup.sh'"
          # Store secrets in a protected env file instead of exposing them in the crontab command line.
          ssh production "cat > '$REMOTE_BASE_DIR/config/email_backup.env' <<'EOF'
          MAILJET_API_KEY=$MAILJET_API_KEY
          MAILJET_SECRET_KEY=$MAILJET_SECRET_KEY
          MAILJET_API_BASE_URL=$MAILJET_API_BASE_URL
          EMAIL_RECIPIENT=$EMAIL_RECIPIENT
          EMAIL_SENDER=$EMAIL_SENDER
          REDIS_KEY=$REDIS_KEY
          MAILJET_REDIS_TEMPLATE_ID=$MAILJET_REDIS_TEMPLATE_ID
          STOCKS_TELEGRAM_BOT_TOKEN=$STOCKS_TELEGRAM_ADMIN_BOT_TOKEN
          STOCKS_TELEGRAM_CHANNEL_ID=$STOCKS_TELEGRAM_ADMIN_ID
          EOF
          chmod 600 '$REMOTE_BASE_DIR/config/email_backup.env'"
      - name: Install email backup cron entry
        run: |
          ssh production "tmp=\$(mktemp); \
            crontab -l 2>/dev/null | grep -v 'email_backup.sh' > \"\$tmp\" || true; \
            printf '%s\n' '5 20,21 * * 0-6 EMAIL_BACKUP_ENV_FILE=$REMOTE_BASE_DIR/config/email_backup.env /bin/bash $REMOTE_BASE_DIR/cron/email_backup.sh >> $REMOTE_BASE_DIR/logs/email_backup.log 2>&1' >> \"\$tmp\"; \
            crontab \"\$tmp\"; \
            rm -f \"\$tmp\"; \
            crontab -l"
      - name: Cleanup SSH configuration
        if: ${{ always() }}
        run: rm -rf ~/.ssh
  notify_unsuccessful:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ always() && needs.deploy.result == 'failure' }}
    steps:
      - name: Send telegram notification unsuccessful run
        env:
          STOCKS_TELEGRAM_DEV_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_DEV_BOT_TOKEN }}
          STOCKS_TELEGRAM_DEV_ID: ${{ secrets.STOCKS_TELEGRAM_DEV_ID }}
        run: |
          now=$(date +%Y-%m-%dT%H:%M:%S%:z)
          text=$(echo "\[Github action\] Market data notification backend deploy cron common failed at $now. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | sed 's~[[:blank:]]~%20~g')
          curl "https://api.telegram.org/bot${STOCKS_TELEGRAM_DEV_BOT_TOKEN}/sendMessage?chat_id=${STOCKS_TELEGRAM_DEV_ID}&text=$text"
