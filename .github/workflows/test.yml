name: Test and build
on:
  push:
    branches:
      - feature/*
      - master
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
        - info
        - warning
        - debug
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_ID }}
          private-key: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Run tests with docker compose
        run: |
          mkdir secret
          echo "${{ steps.app-token.outputs.token }}" > secret/github_token
          docker compose -f docker-compose.test.yml up --exit-code-from backend
          rm -rf secret/github_token
          docker compose -f docker-compose.test.yml down
  build_arm64_release_image:
    runs-on: ubuntu-24.04-arm
    needs: [test]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_ID }}
          private-key: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup GitHub token secret
        run: |
          mkdir secret
          echo "${{ steps.app-token.outputs.token }}" > secret/github_token
      - name: Build release image for arm64
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/arm64
          secret-files: |
            "github_token=secret/github_token"
          push: false
          target: release
          tags: ghcr.io/${{ github.repository_owner }}/market_data_notification:${{ github.sha }}-arm64-validation
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/market_data_notification:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/market_data_notification:buildcache,mode=max
      - name: Teardown GitHub token secret
        if: ${{ always() }}
        run: |
          rm -rf secret/github_token
  notify_unsuccessful:
    runs-on: ubuntu-latest
    needs: [test, build_arm64_release_image]
    if: ${{ always() && (needs.test.result == 'failure' || needs.build_arm64_release_image.result == 'failure') }}
    env:
      STOCKS_TELEGRAM_DEV_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_DEV_BOT_TOKEN }}
      STOCKS_TELEGRAM_DEV_ID: ${{ secrets.STOCKS_TELEGRAM_DEV_ID }}
    steps:
      - name: Send telegram notification unsuccessful run
        run: |
          now=$(date +%Y-%m-%dT%H:%M:%S%:z)
          text=$(echo "\[Github action\] Market data notification backend test and build failed at $now. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | sed 's~[[:blank:]]~%20~g')
          curl "https://api.telegram.org/bot${STOCKS_TELEGRAM_DEV_BOT_TOKEN}/sendMessage?chat_id=${STOCKS_TELEGRAM_DEV_ID}&text=$text"
