version: "3.8"

services:
  backend:
    container_name: market_data_notification
    build:
      context: .
      target: dev
      secrets:
        - source: github_token
          mode: 0600
    working_dir: /app
    env_file: .env
    command: poetry run python3 main.py
    depends_on:
      - redis
      - chrome
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
    environment:
      ENV: dev
      SELENIUM_REMOTE_MODE: "true"
  redis:
    container_name: redis
    build:
      context: .
      dockerfile: Dockerfile-redis
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
  chrome:
    # https://github.com/seleniumhq-community/docker-seleniarm
    image: seleniarm/standalone-chromium:114.0-20230615
    container_name: chrome
#    shm_size: 2gb
    ports:
      - "4444:4444"
      - "5900:5900"
      - "7900:7900"
#    volumes:
#      - /dev/shm

volumes:
  redis_data:

secrets:
  github_token:
    file: secret/github_token
