name: Test and build
concurrency:
  group: market-data-notification-test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}
permissions:
  contents: read
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
        - info
        - warning
        - debug
jobs:
  code_quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_ID }}
          private-key: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Install Poetry
        run: python -m pip install "poetry==1.8.5"
      - name: Install dependencies
        run: |
          git config --global \
            url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf \
            ssh://git@github.com/
          poetry install --no-root
      - name: Run Ruff
        run: poetry run ruff check .
      - name: Run Python bytecode compilation
        run: poetry run python -m compileall src tests main.py
      - name: Cleanup Git auth rewrite
        if: ${{ always() }}
        run: rm -f ~/.gitconfig
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_ID }}
          private-key: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup GitHub token secret
        run: |
          mkdir -p secret
          echo "${{ steps.app-token.outputs.token }}" > secret/github_token
      - name: Run tests with docker compose
        run: |
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend
      - name: Teardown docker compose and token secret
        if: ${{ always() }}
        run: |
          docker compose -f docker-compose.test.yml down -v --remove-orphans
          rm -rf secret
  publish_multiarch_release_image:
    runs-on: ubuntu-latest
    needs: [code_quality, unit_tests]
    if: ${{ github.ref == 'refs/heads/master' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_BUILD_PUSH_TOKEN }}
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_ID }}
          private-key: ${{ secrets.MARKET_DATA_LIBRARY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup GitHub token secret
        run: |
          mkdir -p secret
          echo "${{ steps.app-token.outputs.token }}" > secret/github_token
      - name: Publish release image for amd64 and arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          secret-files: |
            "github_token=secret/github_token"
          push: true
          target: release
          tags: ghcr.io/${{ github.repository_owner }}/market_data_notification:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/market_data_notification:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/market_data_notification:buildcache,mode=max
      - name: Teardown GitHub token secret
        if: ${{ always() }}
        run: |
          rm -rf secret
      - name: Delete old github package versions
        uses: actions/delete-package-versions@v4
        with:
          package-name: 'market_data_notification'
          package-type: 'container'
          min-versions-to-keep: 50
          token: ${{ secrets.DELETE_OLD_PACKAGE_TOKEN }}
  notify_unsuccessful:
    runs-on: ubuntu-latest
    needs: [code_quality, unit_tests, publish_multiarch_release_image]
    if: ${{ always() && (needs.code_quality.result == 'failure' || needs.unit_tests.result == 'failure' || needs.publish_multiarch_release_image.result == 'failure') }}
    env:
      STOCKS_TELEGRAM_DEV_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_DEV_BOT_TOKEN }}
      STOCKS_TELEGRAM_DEV_ID: ${{ secrets.STOCKS_TELEGRAM_DEV_ID }}
    steps:
      - name: Send telegram notification unsuccessful run
        run: |
          now=$(date +%Y-%m-%dT%H:%M:%S%:z)
          text=$(echo "\[Github action\] Market data notification backend validation or image publish failed at $now. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | sed 's~[[:blank:]]~%20~g')
          curl "https://api.telegram.org/bot${STOCKS_TELEGRAM_DEV_BOT_TOKEN}/sendMessage?chat_id=${STOCKS_TELEGRAM_DEV_ID}&text=$text"
