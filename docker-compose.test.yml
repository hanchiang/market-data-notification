services:
  backend:
    container_name: market_data_notification.com_test
    build:
      context: .
      target: test
      secrets:
        - source: github_token
          mode: 0600
    working_dir: /app
    env_file: .env.test
    command: poetry run pytest tests/unit
    depends_on:
      - redis
  redis:
    container_name: redis
    image: redis:7.0.7
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  redis_data:

secrets:
  github_token:
    file: secret/github_token
