version: "3.8"

services:
  backend:
    container_name: market_data_notification
    build:
      context: .
      target: dev
      secrets:
        - source: github_token
          mode: 0600
    working_dir: /app
    env_file: .env
    command: python3 main.py
    depends_on:
      - redis
      - chrome
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      # Uncomment to make the backend container import the sibling
      # `market-data-library/` checkout instead of the git-pinned package that
      # was installed into the image during `poetry install`.
      # - ../market-data-library:/app/market-data-library-local:ro
    environment:
      ENV: dev
      SELENIUM_REMOTE_MODE: "true"
      SELENIUM_SERVER_HOST: "http://chrome:4444"
      # Default Docker behavior uses the released git-pinned
      # `market-data-library` package installed into the image.
      # Uncomment this together with the bind mount above to mirror the local
      # `./scripts/use_local_market_data_library.sh` workflow in Docker:
      # PYTHONPATH: "/app/market-data-library-local:/app"
  redis:
    container_name: redis
    build:
      context: .
      dockerfile: Dockerfile-redis
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
  chrome:
    # https://github.com/SeleniumHQ/docker-selenium
    image: selenium/standalone-chromium:145.0.7632.109-20260222
    container_name: chrome
#    shm_size: 2gb
    ports:
      - "4444:4444"
      - "5900:5900"
      - "7900:7900"
#    volumes:
#      - /dev/shm

volumes:
  redis_data:

secrets:
  github_token:
    file: secret/github_token
