name: Build and deploy
concurrency:
  group: market-data-notification-production
  cancel-in-progress: false
permissions:
  actions: read
  contents: read
  packages: read
on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Published image SHA to deploy, or latest-successful-master'
        required: false
        default: latest-successful-master
        type: string
      allow_unverified_image:
        description: 'Allow deploying a manually supplied image SHA that is not auto-resolved from the latest successful master CI run'
        required: false
        default: false
        type: boolean
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
        - info
        - warning
        - debug
env:
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
  APP_NAME: market_data_notification
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  REGISTRY_USER: ${{ github.repository_owner }}
jobs:
  resolve_image:
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.resolve.outputs.image_sha }}
    steps:
      - name: Resolve published image SHA
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          image_sha="${{ inputs.image_sha || 'latest-successful-master' }}"
          if [ "$image_sha" = "latest-successful-master" ]
          then
            image_sha=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?branch=master&status=completed&per_page=100" \
              | python3 -c 'import json,sys; data=json.load(sys.stdin); runs=[run for run in data["workflow_runs"] if run["name"]=="Test and build" and run["conclusion"]=="success"]; print(runs[0]["head_sha"] if runs else "")')
          elif [ "${{ inputs.allow_unverified_image }}" != "true" ]
          then
            echo "manual image SHAs require allow_unverified_image=true"
            exit 1
          fi
          if [ -z "$image_sha" ]
          then
            echo "image sha is required"
            exit 1
          fi
          echo "image_sha=$image_sha" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: [resolve_image]
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_PULL_TOKEN }}
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Pin the server host key instead of trusting the network at runtime.
          if [ -z "$SSH_KNOWN_HOSTS" ]
          then
            echo "SSH_KNOWN_HOSTS secret must be configured"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/market_data_notification_rsa
          chmod 600 ~/.ssh/market_data_notification_rsa
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat << EOF > ~/.ssh/config
          Host production
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/market_data_notification_rsa
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
      - name: Verify published image exists
        env:
          IMAGE_SHA: ${{ needs.resolve_image.outputs.image_sha }}
        run: docker manifest inspect "$IMAGE_REGISTRY/$APP_NAME:$IMAGE_SHA" > /dev/null
      - name: Check SSH connectivity
        run: ssh production 'echo "SSH connectivity confirmed"'
      - name: Upload container health check helper
        run: scp ./scripts/cron/healthcheck_container.py production:/tmp/market_data_notification_healthcheck.py
      - name: SSH into server, pull image, run container
        id: deploy
        env:
          IMAGE_SHA: ${{ needs.resolve_image.outputs.image_sha }}
          DOCKER_PULL_PASSWORD: ${{ secrets.DOCKER_PULL_TOKEN }}
          STOCKS_TELEGRAM_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_BOT_TOKEN }}
          STOCKS_TELEGRAM_CHANNEL_ID: ${{ secrets.STOCKS_TELEGRAM_CHANNEL_ID }}
          STOCKS_TELEGRAM_ADMIN_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_ADMIN_BOT_TOKEN }}
          STOCKS_TELEGRAM_ADMIN_ID: ${{ secrets.STOCKS_TELEGRAM_ADMIN_ID }}
          STOCKS_TELEGRAM_DEV_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_DEV_BOT_TOKEN }}
          STOCKS_TELEGRAM_DEV_ID: ${{ secrets.STOCKS_TELEGRAM_DEV_ID }}
          CRYPTO_TELEGRAM_BOT_TOKEN: ${{ secrets.CRYPTO_TELEGRAM_BOT_TOKEN }}
          CRYPTO_TELEGRAM_CHANNEL_ID: ${{ secrets.CRYPTO_TELEGRAM_CHANNEL_ID }}
          CRYPTO_TELEGRAM_ADMIN_BOT_TOKEN: ${{ secrets.CRYPTO_TELEGRAM_ADMIN_BOT_TOKEN }}
          CRYPTO_TELEGRAM_ADMIN_ID: ${{ secrets.CRYPTO_TELEGRAM_ADMIN_ID }}
          CRYPTO_TELEGRAM_DEV_BOT_TOKEN: ${{ secrets.CRYPTO_TELEGRAM_DEV_BOT_TOKEN }}
          CRYPTO_TELEGRAM_DEV_ID: ${{ secrets.CRYPTO_TELEGRAM_DEV_ID }}
          SIMULATE_TRADINGVIEW_TRAFFIC: ${{ secrets.SIMULATE_TRADINGVIEW_TRAFFIC }}
          IS_TESTING_TELEGRAM: ${{ secrets.IS_TESTING_TELEGRAM }}
          TRADING_VIEW_IPS: ${{ secrets.TRADING_VIEW_IPS }}
          WHITELIST_IPS: ${{ secrets.WHITELIST_IPS }}
          TRADING_VIEW_WEBHOOK_SECRET: ${{ secrets.TRADING_VIEW_WEBHOOK_SECRET }}
          DISABLE_TELEGRAM: ${{ secrets.DISABLE_TELEGRAM }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
          MESSARI_ASSET_METRICS_SHA256: ${{ secrets.MESSARI_ASSET_METRICS_SHA256 }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          AUTH_EXCLUDE_ENDPOINTS: ${{ secrets.AUTH_EXCLUDE_ENDPOINTS }}
          SHOULD_COMPARE_STOCKS_VOLUME_RANK: ${{ vars.SHOULD_COMPARE_STOCKS_VOLUME_RANK }}
          DISPLAY_VIX_FUTURES_CONTANGO_DECREASE_PAST_N_DAYS: ${{ vars.DISPLAY_VIX_FUTURES_CONTANGO_DECREASE_PAST_N_DAYS }}
          SELENIUM_REMOTE_MODE: ${{ vars.SELENIUM_REMOTE_MODE }}
          SELENIUM_STEALTH: ${{ vars.SELENIUM_STEALTH }}
          ENV: ${{ vars.ENV }}
          SHOULD_SEND_STOCKS_SENTIMENT_MESSAGE: ${{ vars.SHOULD_SEND_STOCKS_SENTIMENT_MESSAGE }}
          CMC_COIN_PRICE_CHANGE_24H_PERCENTAGE_THRESHOLD: ${{ vars.CMC_COIN_PRICE_CHANGE_24H_PERCENTAGE_THRESHOLD }}
          CMC_COIN_MARKET_CAP_CHANGE_24H_PERCENTAGE_THRESHOLD: ${{ vars.CMC_COIN_MARKET_CAP_CHANGE_24H_PERCENTAGE_THRESHOLD }}
        run: |
          ssh production << EOF
          set -euo pipefail
          # This heredoc is intentionally unquoted so GitHub Actions env values
          # expand on the runner before the script is sent over SSH. Any value
          # that only exists on the remote shell must therefore be escaped or
          # assigned as a literal here, or the runner will erase it first.
          # Keep the previous container around until the replacement has passed a health check.
          backup_name="${APP_NAME}_backup"
          candidate_name="${APP_NAME}_candidate"
          chrome_name="chrome"
          chrome_backup_name="chrome_backup"
          chrome_candidate_name="chrome_candidate"
          chrome_image="selenium/standalone-chromium:145.0.7632.109-20260222"
          selenium_server_host="http://127.0.0.1:4444"

          cleanup_candidate() {
            docker rm -f "\$candidate_name" >/dev/null 2>&1 || true
          }

          cleanup_chrome_candidate() {
            docker rm -f "\$chrome_candidate_name" >/dev/null 2>&1 || true
          }

          cleanup_chrome_backup() {
            docker rm -f "\$chrome_backup_name" >/dev/null 2>&1 || true
          }

          rollback() {
            echo "Deployment failed, restoring previous container"
            cleanup_candidate
            if docker container inspect "\$backup_name" >/dev/null 2>&1
            then
              docker rm -f "$APP_NAME" >/dev/null 2>&1 || true
              docker rename "\$backup_name" "$APP_NAME"
              docker start "$APP_NAME" >/dev/null 2>&1 || true
            fi
          }

          rollback_chrome() {
            echo "Chrome deployment failed, restoring previous chrome container"
            cleanup_chrome_candidate
            if docker container inspect "\$chrome_backup_name" >/dev/null 2>&1
            then
              docker rm -f "\$chrome_name" >/dev/null 2>&1 || true
              docker rename "\$chrome_backup_name" "\$chrome_name"
              docker start "\$chrome_name" >/dev/null 2>&1 || true
            fi
          }

          wait_for_chrome_ready() {
            # Probe the Selenium status endpoint from the host so promotion only
            # happens after the replacement container is actually serving WebDriver.
            for attempt in \$(seq 1 12)
            do
              if curl -fsS http://127.0.0.1:4444/status | grep -q '"ready":[[:space:]]*true'
              then
                return 0
              fi
              if [ "\$attempt" -eq 12 ]
              then
                echo "Chrome container did not become ready"
                return 1
              fi
              sleep 5
            done
          }

          trap rollback ERR
          echo "Logging into container registry"
          echo $DOCKER_PULL_PASSWORD | docker login ghcr.io -u $REGISTRY_USER --password-stdin

          echo "Pulling image"
          docker pull "$IMAGE_REGISTRY/$APP_NAME:$IMAGE_SHA"

          cleanup_candidate
          docker rm -f "\$backup_name" >/dev/null 2>&1 || true

          if docker container inspect "$APP_NAME" >/dev/null 2>&1
          then
            echo "Stopping existing container"
            docker stop "$APP_NAME"
            docker rename "$APP_NAME" "\$backup_name"
          fi

          echo "Starting candidate container"
          # Production deploy uses host networking for both containers, so the backend must
          # reach Selenium over loopback rather than the Docker Compose-only hostname `chrome`.
          docker run --name "\$candidate_name" -p 8080:8080 --network host --memory="512m" --cpus="0.5" -e ENV=$ENV -e STOCKS_TELEGRAM_BOT_TOKEN=$STOCKS_TELEGRAM_BOT_TOKEN \
          -e STOCKS_TELEGRAM_CHANNEL_ID=$STOCKS_TELEGRAM_CHANNEL_ID -e STOCKS_TELEGRAM_ADMIN_BOT_TOKEN=$STOCKS_TELEGRAM_ADMIN_BOT_TOKEN \
          -e STOCKS_TELEGRAM_ADMIN_ID=$STOCKS_TELEGRAM_ADMIN_ID -e STOCKS_TELEGRAM_DEV_BOT_TOKEN=$STOCKS_TELEGRAM_DEV_BOT_TOKEN \
          -e STOCKS_TELEGRAM_DEV_ID=$STOCKS_TELEGRAM_DEV_ID -e CRYPTO_TELEGRAM_BOT_TOKEN=$CRYPTO_TELEGRAM_BOT_TOKEN \
          -e CRYPTO_TELEGRAM_CHANNEL_ID=$CRYPTO_TELEGRAM_CHANNEL_ID -e CRYPTO_TELEGRAM_ADMIN_BOT_TOKEN=$CRYPTO_TELEGRAM_ADMIN_BOT_TOKEN \
          -e CRYPTO_TELEGRAM_ADMIN_ID=$CRYPTO_TELEGRAM_ADMIN_ID -e CRYPTO_TELEGRAM_DEV_BOT_TOKEN=$CRYPTO_TELEGRAM_DEV_BOT_TOKEN \
          -e CRYPTO_TELEGRAM_DEV_ID=$CRYPTO_TELEGRAM_DEV_ID -e SIMULATE_TRADINGVIEW_TRAFFIC=$SIMULATE_TRADINGVIEW_TRAFFIC \
          -e IS_TESTING_TELEGRAM=$IS_TESTING_TELEGRAM -e TRADING_VIEW_IPS=$TRADING_VIEW_IPS -e WHITELIST_IPS=$WHITELIST_IPS \
          -e TRADING_VIEW_WEBHOOK_SECRET=$TRADING_VIEW_WEBHOOK_SECRET \
          -e DISABLE_TELEGRAM=$DISABLE_TELEGRAM -e REDIS_HOST=$REDIS_HOST -e REDIS_PORT=$REDIS_PORT -e REDIS_DB=$REDIS_DB \
          -e MESSARI_ASSET_METRICS_SHA256=$MESSARI_ASSET_METRICS_SHA256 -e SHOULD_COMPARE_STOCKS_VOLUME_RANK=$SHOULD_COMPARE_STOCKS_VOLUME_RANK \
          -e DISPLAY_VIX_FUTURES_CONTANGO_DECREASE_PAST_N_DAYS=$DISPLAY_VIX_FUTURES_CONTANGO_DECREASE_PAST_N_DAYS \
          -e SELENIUM_REMOTE_MODE=$SELENIUM_REMOTE_MODE -e SELENIUM_SERVER_HOST=\$selenium_server_host -e SELENIUM_STEALTH=$SELENIUM_STEALTH \
          -e SHOULD_SEND_STOCKS_SENTIMENT_MESSAGE=$SHOULD_SEND_STOCKS_SENTIMENT_MESSAGE \
          -e API_AUTH_TOKEN=$API_AUTH_TOKEN -e AUTH_EXCLUDE_ENDPOINTS=$AUTH_EXCLUDE_ENDPOINTS \
          -e CMC_COIN_PRICE_CHANGE_24H_PERCENTAGE_THRESHOLD=$CMC_COIN_PRICE_CHANGE_24H_PERCENTAGE_THRESHOLD \
          -e CMC_COIN_MARKET_CAP_CHANGE_24H_PERCENTAGE_THRESHOLD=$CMC_COIN_MARKET_CAP_CHANGE_24H_PERCENTAGE_THRESHOLD \
          -d "$IMAGE_REGISTRY/$APP_NAME:$IMAGE_SHA"

          echo "Checking candidate container health"
          # Probe from inside the container so rollout does not depend on external DNS or ingress timing.
          docker cp /tmp/market_data_notification_healthcheck.py "\$candidate_name":/tmp/market_data_notification_healthcheck.py
          for attempt in \$(seq 1 12)
          do
            if docker exec "\$candidate_name" python /tmp/market_data_notification_healthcheck.py
            then
              break
            fi
            if [ "\$attempt" -eq 12 ]
            then
              echo "Candidate container did not become healthy"
              exit 1
            fi
            sleep 5
          done

          docker rename "\$candidate_name" "$APP_NAME"
          trap - ERR
          docker rm -f "\$backup_name" >/dev/null 2>&1 || true

          cleanup_chrome_candidate
          if ! docker container inspect "\$chrome_name" >/dev/null 2>&1 && docker container inspect "\$chrome_backup_name" >/dev/null 2>&1
          then
            echo "Restoring leftover chrome backup container before rollout"
            docker rename "\$chrome_backup_name" "\$chrome_name"
          fi
          if docker container inspect "\$chrome_name" >/dev/null 2>&1
          then
            cleanup_chrome_backup
            current_chrome_image="\$(docker inspect -f '{{.Config.Image}}' "\$chrome_name")"
            if [ "\$current_chrome_image" != "\$chrome_image" ]
            then
              # Keep the previous Chrome container as a rollback target until the
              # replacement image has started and reported Selenium readiness.
              echo "Recreating chrome container for image change: \$current_chrome_image -> \$chrome_image"
              echo "Pulling chrome image"
              docker pull "\$chrome_image"
              trap rollback_chrome ERR
              if [ "\$(docker inspect -f '{{.State.Running}}' "\$chrome_name")" = "true" ]
              then
                docker stop "\$chrome_name" >/dev/null
              fi
              docker rename "\$chrome_name" "\$chrome_backup_name"
              echo "Starting chrome candidate container"
              docker run --name "\$chrome_candidate_name" -p 4444:4444 -p 5900:5900 -p 7900:7900 --network host --memory="1.2g" --cpus="1.5" -d "\$chrome_image"
              echo "Checking chrome candidate readiness"
              wait_for_chrome_ready
              docker rename "\$chrome_candidate_name" "\$chrome_name"
              trap - ERR
              cleanup_chrome_backup
            elif [ "\$(docker inspect -f '{{.State.Running}}' "\$chrome_name")" != "true" ]
            then
              # Even a restart-only path must prove Selenium is responsive before
              # the deploy is allowed to continue.
              echo "Starting existing chrome container"
              docker start "\$chrome_name" >/dev/null
              echo "Checking restarted chrome readiness"
              wait_for_chrome_ready
            fi
          else
            # No existing Chrome container: create one and wait for readiness
            # before considering the deploy complete.
            echo "Pulling chrome image"
            docker pull "\$chrome_image"
            trap rollback_chrome ERR
            echo "Starting chrome candidate container"
            docker run --name "\$chrome_candidate_name" -p 4444:4444 -p 5900:5900 -p 7900:7900 --network host --memory="1.2g" --cpus="1.5" -d "\$chrome_image"
            echo "Checking chrome candidate readiness"
            wait_for_chrome_ready
            docker rename "\$chrome_candidate_name" "\$chrome_name"
            trap - ERR
          fi

          docker ps
          docker image prune -f
          EOF
      - name: Wait for post-deploy health check
        run: |
          for attempt in $(seq 1 12)
          do
            if curl -fsS "$SSH_HOST/healthz" > /dev/null
            then
              echo "market_data_notification is healthy"
              exit 0
            fi
            echo "Waiting for post-deploy health check, attempt $attempt"
            sleep 10
          done
          echo "market_data_notification did not become healthy"
          exit 1
      - name: Cleanup SSH configuration
        if: ${{ always() }}
        run: rm -rf ~/.ssh

  notify_unsuccessful:
    runs-on: ubuntu-latest
    needs: [resolve_image, deploy]
    if: ${{ always() && (needs.resolve_image.result == 'failure' || needs.deploy.result == 'failure') }}
    steps:
      - name: Send telegram notification unsuccessful run
        env:
          STOCKS_TELEGRAM_DEV_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_DEV_BOT_TOKEN }}
          STOCKS_TELEGRAM_DEV_ID: ${{ secrets.STOCKS_TELEGRAM_DEV_ID }}
        run: |
          now=$(date +%Y-%m-%dT%H:%M:%S%:z)
          text=$(echo "\[Github action\] Market data notification backend build and deploy failed at $now. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | sed 's~[[:blank:]]~%20~g')
          curl "https://api.telegram.org/bot${STOCKS_TELEGRAM_DEV_BOT_TOKEN}/sendMessage?chat_id=${STOCKS_TELEGRAM_DEV_ID}&text=$text"

  notify_successful:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ needs.deploy.result == 'success' }}
    steps:
      - name: Send telegram notification successful run
        env:
          STOCKS_TELEGRAM_DEV_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_DEV_BOT_TOKEN }}
          STOCKS_TELEGRAM_DEV_ID: ${{ secrets.STOCKS_TELEGRAM_DEV_ID }}
        run: |
          now=$(date +%Y-%m-%dT%H:%M:%S%:z)
          text=$(echo "\[Github action\] Market data notification backend build and deploy succeeded at $now. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | sed 's~[[:blank:]]~%20~g')
          curl "https://api.telegram.org/bot${STOCKS_TELEGRAM_DEV_BOT_TOKEN}/sendMessage?chat_id=${STOCKS_TELEGRAM_DEV_ID}&text=$text"
