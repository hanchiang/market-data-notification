name: Deploy cron stocks
concurrency:
  group: market-data-notification-cron-install
  cancel-in-progress: false
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - warning
          - debug
env:
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
  APP_NAME: market_data_notification
  REMOTE_BASE_DIR: /home/${{ secrets.SSH_USER }}/market_data_notification_jobs
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_KNOWN_HOSTS" ]
          then
            echo "SSH_KNOWN_HOSTS secret must be configured"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/market_data_notification_rsa
          chmod 600 ~/.ssh/market_data_notification_rsa
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat << EOF > ~/.ssh/config
          Host production
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/market_data_notification_rsa
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
      - name: Check SSH connectivity
        run: ssh production 'echo "SSH connectivity confirmed"'
      - name: Upload cron runner
        run: |
          # Install a tracked helper script on the host so cron uses fixed absolute paths.
          ssh production "mkdir -p '$REMOTE_BASE_DIR/cron' '$REMOTE_BASE_DIR/logs'"
          scp ./scripts/cron/run_notification_job.sh production:"$REMOTE_BASE_DIR/cron/run_notification_job.sh"
          ssh production "chmod 755 '$REMOTE_BASE_DIR/cron/run_notification_job.sh'"
      - name: Install stocks cron entry
        run: |
          ssh production "CRON_ENTRY='0 13,14 * * 1-6 /bin/bash $REMOTE_BASE_DIR/cron/run_notification_job.sh $APP_NAME src/job/stocks/stocks.py 0 0 >> $REMOTE_BASE_DIR/logs/stocks.log 2>&1'; \
            tmp=\$(mktemp); \
            crontab -l 2>/dev/null | grep -v 'src/job/stocks/stocks.py' > \"\$tmp\" || true; \
            printf '%s\n' \"\$CRON_ENTRY\" >> \"\$tmp\"; \
            crontab \"\$tmp\"; \
            rm -f \"\$tmp\"; \
            crontab -l"
      - name: Cleanup SSH configuration
        if: ${{ always() }}
        run: rm -rf ~/.ssh
  notify_unsuccessful:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ always() && needs.deploy.result == 'failure' }}
    steps:
      - name: Send telegram notification unsuccessful run
        env:
          STOCKS_TELEGRAM_DEV_BOT_TOKEN: ${{ secrets.STOCKS_TELEGRAM_DEV_BOT_TOKEN }}
          STOCKS_TELEGRAM_DEV_ID: ${{ secrets.STOCKS_TELEGRAM_DEV_ID }}
        run: |
          now=$(date +%Y-%m-%dT%H:%M:%S%:z)
          text=$(echo "\[Github action\] Market data notification backend deploy cron stocks failed at $now. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | sed 's~[[:blank:]]~%20~g')
          curl "https://api.telegram.org/bot${STOCKS_TELEGRAM_DEV_BOT_TOKEN}/sendMessage?chat_id=${STOCKS_TELEGRAM_DEV_ID}&text=$text"
